deploy:
  runs-on: ubuntu-latest
  needs: [ buildImageAndPush ]
  steps:
    - name: AWS SSM Send-Command
      uses: peterkimzz/aws-ssm-send-command@master
      id: ssm
      with:
        aws-region: ${{ secrets.AWS_REGION }}
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        instance-ids: "i-075ba58572ccc1d5b"
        working-directory: /
        comment: Deploy
        command: |
          docker network inspect common >/dev/null 2>&1 || docker network create common
          docker inspect --format='{{json .NetworkSettings.Networks}}' mysql_1 2>/dev/null | grep -q common || docker network connect common mysql_1
          docker inspect --format='{{json .NetworkSettings.Networks}}' redis_1 2>/dev/null | grep -q common || docker network connect common redis_1
          docker pull ghcr.io/${{ needs.buildImageAndPush.outputs.owner_lc }}/${{ needs.buildImageAndPush.outputs.image_name }}:latest && \
          docker stop app1 2>/dev/null || true && \
          docker rm app1 2>/dev/null || true && \
          docker run -d --network common --name app1 -p 8080:8080 ghcr.io/${{ needs.buildImageAndPush.outputs.owner_lc }}/${{ needs.buildImageAndPush.outputs.image_name }}:latest && \
          docker rmi $(docker images -f "dangling=true" -q) || true